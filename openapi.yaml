openapi: 3.0.3
info:
  title: Redstick Ventures Command Center API
  description: |
    Complete API for the Redstick Ventures Command Center platform.
    
    ## Authentication
    All API requests require a JWT token in the Authorization header:
    ```
    Authorization: Bearer <token>
    ```
    
    ## Rate Limiting
    - Authenticated: 1000 requests/minute
    - Unauthenticated: 20 requests/minute
    
    ## Base URLs
    - Production: https://api.redstick.vc
    - Staging: https://api-staging.redstick.vc
    - Development: http://localhost:3000/api
  version: 1.0.0
  contact:
    name: Redstick API Support
    email: api-support@redstick.vc
    url: https://docs.redstick.vc
  license:
    name: Proprietary
    url: https://redstick.vc/terms

servers:
  - url: https://api.redstick.vc/api/v1
    description: Production
  - url: https://api-staging.redstick.vc/api/v1
    description: Staging
  - url: http://localhost:3000/api/v1
    description: Development

security:
  - bearerAuth: []

paths:
  # Authentication
  /auth/login:
    post:
      tags:
        - Authentication
      summary: User login
      description: Authenticate user and obtain access tokens
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '400':
          $ref: '#/components/responses/ValidationError'

  /auth/refresh:
    post:
      tags:
        - Authentication
      summary: Refresh access token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - refreshToken
              properties:
                refreshToken:
                  type: string
      responses:
        '200':
          description: Token refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /auth/logout:
    post:
      tags:
        - Authentication
      summary: User logout
      responses:
        '200':
          description: Logout successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /auth/forgot-password:
    post:
      tags:
        - Authentication
      summary: Request password reset
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
              properties:
                email:
                  type: string
                  format: email
      responses:
        '200':
          description: Reset email sent

  /auth/reset-password:
    post:
      tags:
        - Authentication
      summary: Reset password
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - token
                - password
              properties:
                token:
                  type: string
                password:
                  type: string
                  minLength: 8
      responses:
        '200':
          description: Password reset successful

  # Deals
  /deals:
    get:
      tags:
        - Deals
      summary: List all deals
      description: Get a paginated list of deals with filtering and sorting
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/SortByParam'
        - $ref: '#/components/parameters/SortOrderParam'
        - name: stage
          in: query
          schema:
            type: string
            enum: [lead, qualified, pitch, duediligence, negotiation, closed, passed]
        - name: status
          in: query
          schema:
            type: string
            enum: [active, onhold, archived]
        - name: assignedTo
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
        - name: minAmount
          in: query
          schema:
            type: number
        - name: maxAmount
          in: query
          schema:
            type: number
        - name: fromDate
          in: query
          schema:
            type: string
            format: date-time
        - name: toDate
          in: query
          schema:
            type: string
            format: date-time
        - name: include
          in: query
          schema:
            type: string
            description: Comma-separated list of related data to include
      responses:
        '200':
          description: List of deals
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DealListResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

    post:
      tags:
        - Deals
      summary: Create a new deal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDealRequest'
      responses:
        '201':
          description: Deal created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DealResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '409':
          $ref: '#/components/responses/ConflictError'

  /deals/{id}:
    get:
      tags:
        - Deals
      summary: Get a specific deal
      parameters:
        - $ref: '#/components/parameters/DealIdParam'
        - name: include
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Deal details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DealDetailResponse'
        '404':
          $ref: '#/components/responses/NotFoundError'

    patch:
      tags:
        - Deals
      summary: Update a deal
      parameters:
        - $ref: '#/components/parameters/DealIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDealRequest'
      responses:
        '200':
          description: Deal updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DealResponse'
        '404':
          $ref: '#/components/responses/NotFoundError'

    delete:
      tags:
        - Deals
      summary: Delete/archive a deal
      parameters:
        - $ref: '#/components/parameters/DealIdParam'
        - name: permanent
          in: query
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Deal deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /deals/{id}/activities:
    post:
      tags:
        - Deals
        - Activities
      summary: Add activity to deal
      parameters:
        - $ref: '#/components/parameters/DealIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateActivityRequest'
      responses:
        '201':
          description: Activity created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActivityResponse'

  # Companies
  /companies:
    get:
      tags:
        - Companies
      summary: List all companies
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: industry
          in: query
          schema:
            type: string
        - name: stage
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
        - name: hasDeal
          in: query
          schema:
            type: boolean
      responses:
        '200':
          description: List of companies
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompanyListResponse'

    post:
      tags:
        - Companies
      summary: Create a new company
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCompanyRequest'
      responses:
        '201':
          description: Company created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompanyResponse'

  /companies/{id}:
    get:
      tags:
        - Companies
      summary: Get a specific company
      parameters:
        - $ref: '#/components/parameters/CompanyIdParam'
      responses:
        '200':
          description: Company details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompanyDetailResponse'
        '404':
          $ref: '#/components/responses/NotFoundError'

    patch:
      tags:
        - Companies
      summary: Update a company
      parameters:
        - $ref: '#/components/parameters/CompanyIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCompanyRequest'
      responses:
        '200':
          description: Company updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompanyResponse'

    delete:
      tags:
        - Companies
      summary: Delete a company
      parameters:
        - $ref: '#/components/parameters/CompanyIdParam'
      responses:
        '200':
          description: Company deleted

  # Agents
  /agents:
    get:
      tags:
        - Agents
      summary: List all agents
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [active, inactive]
        - name: search
          in: query
          schema:
            type: string
      responses:
        '200':
          description: List of agents
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentListResponse'

  /agents/{id}:
    get:
      tags:
        - Agents
      summary: Get agent details
      parameters:
        - $ref: '#/components/parameters/AgentIdParam'
      responses:
        '200':
          description: Agent details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentDetailResponse'

  /agents/{id}/run:
    post:
      tags:
        - Agents
      summary: Execute an agent
      parameters:
        - $ref: '#/components/parameters/AgentIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RunAgentRequest'
      responses:
        '202':
          description: Agent run queued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentRunQueuedResponse'
        '429':
          $ref: '#/components/responses/RateLimitError'

  /agents/runs:
    get:
      tags:
        - Agents
      summary: List agent run history
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: agentId
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [queued, running, paused, completed, failed, cancelled]
      responses:
        '200':
          description: List of agent runs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentRunListResponse'

  /agents/runs/{runId}:
    get:
      tags:
        - Agents
      summary: Get agent run status and results
      parameters:
        - $ref: '#/components/parameters/RunIdParam'
      responses:
        '200':
          description: Agent run details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentRunDetailResponse'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /agents/runs/{runId}/cancel:
    post:
      tags:
        - Agents
      summary: Cancel a running agent
      parameters:
        - $ref: '#/components/parameters/RunIdParam'
      responses:
        '200':
          description: Agent run cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  # Users
  /users:
    get:
      tags:
        - Users
      summary: List all users
      description: Admin only
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: role
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [active, inactive, pending]
      responses:
        '200':
          description: List of users
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserListResponse'
        '403':
          $ref: '#/components/responses/ForbiddenError'

  /users/me:
    get:
      tags:
        - Users
      summary: Get current user profile
      responses:
        '200':
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'

    patch:
      tags:
        - Users
      summary: Update current user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: Profile updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'

  /users/{id}:
    get:
      tags:
        - Users
      summary: Get user by ID
      parameters:
        - $ref: '#/components/parameters/UserIdParam'
      responses:
        '200':
          description: User details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '403':
          $ref: '#/components/responses/ForbiddenError'

    patch:
      tags:
        - Users
      summary: Update user
      description: Admin only
      parameters:
        - $ref: '#/components/parameters/UserIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: User updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'

    delete:
      tags:
        - Users
      summary: Deactivate user
      description: Admin only
      parameters:
        - $ref: '#/components/parameters/UserIdParam'
      responses:
        '200':
          description: User deactivated

  # Dashboard
  /dashboard:
    get:
      tags:
        - Dashboard
      summary: Get dashboard data
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum: [week, month, quarter, year]
            default: month
      responses:
        '200':
          description: Dashboard data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardResponse'

  # Notifications
  /notifications:
    get:
      tags:
        - Notifications
      summary: Get user notifications
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: unreadOnly
          in: query
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: List of notifications
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationListResponse'

  /notifications/{id}/read:
    patch:
      tags:
        - Notifications
      summary: Mark notification as read
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Notification marked as read

  /notifications/read-all:
    post:
      tags:
        - Notifications
      summary: Mark all notifications as read
      responses:
        '200':
          description: All notifications marked as read

  # Files
  /files/upload:
    post:
      tags:
        - Files
      summary: Upload a file
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                folder:
                  type: string
                metadata:
                  type: string
                  description: JSON string of metadata
      responses:
        '201':
          description: File uploaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileResponse'
        '400':
          $ref: '#/components/responses/ValidationError'

  /files/{id}:
    get:
      tags:
        - Files
      summary: Get file details
      parameters:
        - $ref: '#/components/parameters/FileIdParam'
      responses:
        '200':
          description: File details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileResponse'

    delete:
      tags:
        - Files
      summary: Delete a file
      parameters:
        - $ref: '#/components/parameters/FileIdParam'
      responses:
        '200':
          description: File deleted

  /files/{id}/download:
    get:
      tags:
        - Files
      summary: Get download URL for file
      parameters:
        - $ref: '#/components/parameters/FileIdParam'
      responses:
        '200':
          description: Download URL
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      url:
                        type: string
                      expiresAt:
                        type: string
                        format: date-time

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtained from login

  parameters:
    PageParam:
      name: page
      in: query
      schema:
        type: integer
        default: 1
        minimum: 1

    LimitParam:
      name: limit
      in: query
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 100

    SortByParam:
      name: sortBy
      in: query
      schema:
        type: string
        default: createdAt

    SortOrderParam:
      name: sortOrder
      in: query
      schema:
        type: string
        enum: [asc, desc]
        default: desc

    DealIdParam:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: Deal ID

    CompanyIdParam:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: Company ID

    AgentIdParam:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: Agent ID

    RunIdParam:
      name: runId
      in: path
      required: true
      schema:
        type: string
      description: Agent run ID

    UserIdParam:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: User ID

    FileIdParam:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: File ID

  schemas:
    # Base Response
    SuccessResponse:
      type: object
      required:
        - success
      properties:
        success:
          type: boolean
        data:
          type: object

    # Pagination
    Pagination:
      type: object
      properties:
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer
        totalPages:
          type: integer
        hasNextPage:
          type: boolean
        hasPrevPage:
          type: boolean

    # User
    User:
      type: object
      required:
        - id
        - name
        - email
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
        roles:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [active, inactive, pending]
        avatar:
          type: string
          format: uri
        department:
          type: string
        title:
          type: string
        phone:
          type: string
        lastLoginAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time

    UserResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/User'

    UserListResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessResponse'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/User'
            pagination:
              $ref: '#/components/schemas/Pagination'

    UpdateUserRequest:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        avatar:
          type: string
        department:
          type: string
        title:
          type: string
        phone:
          type: string

    # Authentication
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
        mfaCode:
          type: string

    LoginResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessResponse'
        - type: object
          properties:
            data:
              type: object
              properties:
                user:
                  $ref: '#/components/schemas/User'
                tokens:
                  $ref: '#/components/schemas/Tokens'

    Tokens:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        accessTokenExpires:
          type: string
          format: date-time
        refreshTokenExpires:
          type: string
          format: date-time

    TokenResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/Tokens'

    # Deal
    Deal:
      type: object
      required:
        - id
        - companyName
        - stage
      properties:
        id:
          type: string
        companyId:
          type: string
        companyName:
          type: string
        stage:
          type: string
          enum: [lead, qualified, pitch, duediligence, negotiation, closed, passed]
        status:
          type: string
          enum: [active, onhold, archived]
        amount:
          type: number
        description:
          type: string
        source:
          type: string
        sourceDetail:
          type: string
        probability:
          type: number
          minimum: 0
          maximum: 100
        expectedCloseDate:
          type: string
          format: date
        assignedTo:
          type: string
        assignee:
          $ref: '#/components/schemas/User'
        tags:
          type: array
          items:
            type: string
        customFields:
          type: object
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        createdBy:
          type: string
        lastActivityAt:
          type: string
          format: date-time

    DealResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/Deal'

    DealListResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessResponse'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/Deal'
            pagination:
              $ref: '#/components/schemas/Pagination'

    DealDetailResponse:
      allOf:
        - $ref: '#/components/schemas/DealResponse'
        - type: object
          properties:
            data:
              type: object
              properties:
                company:
                  $ref: '#/components/schemas/Company'
                activities:
                  type: array
                  items:
                    $ref: '#/components/schemas/Activity'
                documents:
                  type: array
                  items:
                    $ref: '#/components/schemas/File'
                notes:
                  type: array
                  items:
                    type: object
                tasks:
                  type: array
                  items:
                    type: object

    CreateDealRequest:
      type: object
      required:
        - companyName
        - stage
      properties:
        companyName:
          type: string
        companyId:
          type: string
        stage:
          type: string
          enum: [lead, qualified, pitch, duediligence, negotiation, closed, passed]
        status:
          type: string
          enum: [active, onhold, archived]
        amount:
          type: number
        description:
          type: string
        source:
          type: string
        sourceDetail:
          type: string
        probability:
          type: number
        expectedCloseDate:
          type: string
          format: date
        assignedTo:
          type: string
        tags:
          type: array
          items:
            type: string
        customFields:
          type: object

    UpdateDealRequest:
      allOf:
        - $ref: '#/components/schemas/CreateDealRequest'
      type: object

    # Company
    Company:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: string
        name:
