      function_calling: true
      vision: true
      json_mode: true
      system_messages: true
      
    rate_limits:
      requests_per_minute: 120
      tokens_per_minute: 180000
      
    tools:
      enabled: true
      supported_tools:
        - web_search
        - code_runner
        - file_read

# =============================================================================
# MODEL SELECTION RULES
# =============================================================================
selection_rules:
  # Rules for selecting models based on task type
  
  coding:
    preferred_provider: kimi
    preferred_model: kimi-k2.5
    fallback: openai/gpt-4
    
  reasoning:
    preferred_provider: kimi
    preferred_model: kimi-k2-thinking
    fallback: anthropic/claude-3-opus
    
  vision:
    preferred_provider: kimi
    preferred_model: kimi-k2.5
    fallback: openai/gpt-4o
    
  long_context:
    preferred_provider: kimi
    preferred_model: kimi-k2.5-long-context
    fallback: google/gemini-1.5-pro
    
  fast:
    preferred_provider: openai
    preferred_model: gpt-4o-mini
    fallback: google/gemini-1.5-flash
    
  local:
    preferred_provider: ollama
    preferred_model: llama3.1
    fallback: null

# =============================================================================
# COST OPTIMIZATION
# =============================================================================
cost_optimization:
  # Enable cost-aware model selection
  enabled: true
  
  # Maximum cost per request (USD)
  max_cost_per_request: 0.50
  
  # Budget per day (USD)
  daily_budget: 10.00
  
  # Alert threshold (percentage of budget)
  alert_threshold: 80
  
  # Auto-switch to cheaper model when approaching budget
  auto_downgrade: true
  
  # Cheaper alternatives
  cheaper_alternatives:
    kimi-k2.5: kimi-k2-thinking
    gpt-4: gpt-4o-mini
    claude-3-opus: claude-3-sonnet
