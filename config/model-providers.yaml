        context_window: 128000
        max_tokens: 4096
        supports_vision: true
        supports_tools: true
        supports_json: true
        supports_streaming: true
        pricing:
          input_per_1k: 0.01
          output_per_1k: 0.03
        description: "Latest GPT-4 Turbo with vision"
        
      gpt-4o:
        name: "gpt-4o"
        display_name: "GPT-4o"
        context_window: 128000
        max_tokens: 4096
        supports_vision: true
        supports_tools: true
        supports_json: true
        supports_streaming: true
        pricing:
          input_per_1k: 0.005
          output_per_1k: 0.015
        description: "GPT-4o - Fast and affordable"
        
      gpt-4o-mini:
        name: "gpt-4o-mini"
        display_name: "GPT-4o Mini"
        context_window: 128000
        max_tokens: 4096
        supports_vision: true
        supports_tools: true
        supports_json: true
        supports_streaming: true
        pricing:
          input_per_1k: 0.00015
          output_per_1k: 0.0006
        description: "Small, fast, and affordable model"
        
      gpt-3.5-turbo:
        name: "gpt-3.5-turbo"
        display_name: "GPT-3.5 Turbo"
        context_window: 16385
        max_tokens: 4096
        supports_vision: false
        supports_tools: true
        supports_json: true
        supports_streaming: true
        pricing:
          input_per_1k: 0.0005
          output_per_1k: 0.0015
        description: "Fast and cost-effective"

    features:
      streaming: true
      function_calling: true
      vision: true
      json_mode: true
      system_messages: true
      
    rate_limits:
      requests_per_minute: 60
      tokens_per_minute: 90000
      
    tools:
      enabled: true
      supported_tools:
        - web_search
        - code_runner
        - file_read
        - file_write

