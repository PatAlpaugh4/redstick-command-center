# =============================================================================
# Kimi Code - Model Provider Configurations
# =============================================================================
# This file defines different AI model providers and their configurations.
# Supports multiple providers for fallback and comparison.
#
# YAML Reference: https://yaml.org/spec/
# Documentation: https://docs.moonshot.ai/kimi-code/providers
# =============================================================================

# =============================================================================
# GLOBAL PROVIDER SETTINGS
# =============================================================================
settings:
  # Default provider to use
  default_provider: kimi
  
  # Enable provider fallback on errors
  fallback_enabled: true
  
  # Fallback order (provider names in priority order)
  fallback_order:
    - kimi
    - openai
    - anthropic
  
  # Request timeout in seconds
  timeout: 60
  
  # Maximum retries per provider
  max_retries: 3
  
  # Retry delay in milliseconds
  retry_delay: 1000
  
  # Enable request caching
  cache_enabled: true
  
  # Cache TTL in seconds
  cache_ttl: 3600

# =============================================================================
# KIMI / MOONSHOT AI PROVIDER
# =============================================================================
providers:
  kimi:
    name: "Kimi"
    display_name: "Kimi AI (Moonshot)"
    description: "Official Kimi API from Moonshot AI"
    enabled: true
    
    # API Configuration
    api:
      base_url: "https://api.moonshot.ai/v1"
      api_key: "${KIMI_API_KEY}"
      organization: null
      
    # Request defaults
    defaults:
      model: "kimi-k2.5"
      temperature: 0.3
      top_p: 0.9
      max_tokens: 8192
      
    # Available models
    models:
      kimi-k2.5:
        name: "kimi-k2.5"
        display_name: "Kimi K2.5"
        context_window: 256000
        max_tokens: 8192
        supports_vision: true
        supports_tools: true
        supports_json: true
        supports_streaming: true
        pricing:
          input_per_1k: 0.015
          output_per_1k: 0.060
        description: "General purpose model with excellent coding capabilities"
        
      kimi-k2-thinking:
        name: "kimi-k2-thinking"
        display_name: "Kimi K2 Thinking"
        context_window: 256000
        max_tokens: 8192
        supports_vision: true
        supports_tools: true
        supports_json: true
        supports_streaming: true
        reasoning: true
        pricing:
          input_per_1k: 0.015
          output_per_1k: 0.060
        description: "Enhanced reasoning model for complex problem-solving"
        
      kimi-k2.5-long-context:
        name: "kimi-k2.5-long-context"
        display_name: "Kimi K2.5 Long Context"
        context_window: 2000000  # 2M tokens
        max_tokens: 8192
        supports_vision: true
        supports_tools: true
        supports_json: true
        supports_streaming: true
        pricing:
          input_per_1k: 0.060
          output_per_1k: 0.120
        description: "Extended context model for large codebases"

    # Feature support
    features:
      streaming: true
      function_calling: true
      vision: true
      json_mode: true
      system_messages: true
      
    # Rate limits
    rate_limits:
      requests_per_minute: 60
      tokens_per_minute: 150000
      
    # Tool support
    tools:
      enabled: true
      supported_tools:
        - web_search
        - code_runner
        - rethink
        - browser_visit
        - file_read
        - file_write
        - shell_execute

  # ===========================================================================
  # OPENAI PROVIDER
  # ===========================================================================
  openai:
    name: "OpenAI"
    display_name: "OpenAI"
    description: "OpenAI GPT models"
    enabled: false
    
    api:
      base_url: "https://api.openai.com/v1"
      api_key: "${OPENAI_API_KEY}"
      organization: "${OPENAI_ORG_ID}"
      
    defaults:
      model: "gpt-4"
      temperature: 0.3
      top_p: 0.9
      max_tokens: 4096
      
    models:
