# Accessibility Tests
# ===================
# Runs automated accessibility tests on push and pull requests.
# Uses axe-core via Puppeteer to test multiple pages.
# 
# Features:
# - Tests against WCAG 2.1 AA standards
# - Generates HTML and JSON reports
# - Uploads reports as artifacts
# - Fails CI on critical violations

name: Accessibility Tests

on:
  push:
    branches: [main, develop]
    paths:
      - 'src/**'
      - '!src/**/*.test.tsx'
      - '!src/**/*.spec.tsx'
  pull_request:
    branches: [main, develop]
    paths:
      - 'src/**'
      - '!src/**/*.test.tsx'
      - '!src/**/*.spec.tsx'
  schedule:
    # Run weekly on Sundays at 2 AM UTC
    - cron: '0 2 * * 0'
  workflow_dispatch:
    # Allow manual triggering

env:
  NODE_VERSION: '18.x'

jobs:
  # Build the application
  build:
    name: Build Application
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build
        env:
          # Use mock values for build
          DATABASE_URL: postgresql://mock:mock@localhost:5432/mock
          NEXTAUTH_SECRET: mock-secret-for-build
          NEXTAUTH_URL: http://localhost:3000

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: .next/
          retention-days: 1

  # Run accessibility tests
  test-a11y:
    name: Run Accessibility Tests
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: .next/

      - name: Install Puppeteer dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgbm-dev

      - name: Start application
        run: |
          npm start &
          npx wait-on http://localhost:3000 --timeout 60000
        env:
          PORT: 3000
          DATABASE_URL: postgresql://mock:mock@localhost:5432/mock
          NEXTAUTH_SECRET: mock-secret-for-ci
          NEXTAUTH_URL: http://localhost:3000

      - name: Run accessibility tests
        run: npx ts-node scripts/test-a11y.ts --url http://localhost:3000
        continue-on-error: true

      - name: Upload accessibility reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: a11y-reports
          path: a11y-reports/
          retention-days: 30

      - name: Check for critical violations
        run: |
          if [ -f a11y-reports/*.json ]; then
            CRITICAL_COUNT=$(cat a11y-reports/*.json | jq '.summary.criticalViolations // 0')
            if [ "$CRITICAL_COUNT" -gt 0 ]; then
              echo "❌ Found $CRITICAL_COUNT critical accessibility violations"
              exit 1
            else
              echo "✅ No critical accessibility violations found"
            fi
          fi

  # Run unit tests with jest-axe
  test-unit-a11y:
    name: Unit Accessibility Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run accessibility unit tests
        run: npm test -- --testPathPattern=a11y --coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # Lighthouse CI audit
  lighthouse:
    name: Lighthouse CI Audit
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: .next/

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli

      - name: Start application
        run: |
          npm start &
          npx wait-on http://localhost:3000 --timeout 60000
        env:
          PORT: 3000
          DATABASE_URL: postgresql://mock:mock@localhost:5432/mock
          NEXTAUTH_SECRET: mock-secret-for-ci
          NEXTAUTH_URL: http://localhost:3000

      - name: Run Lighthouse CI
        run: |
          lhci autorun --config=lighthouserc.js || echo "Lighthouse completed with warnings"
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Upload Lighthouse reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lighthouse-reports
          path: .lighthouseci/
          retention-days: 7

  # Generate summary
  summary:
    name: Generate Summary
    runs-on: ubuntu-latest
    needs: [test-a11y, test-unit-a11y, lighthouse]
    if: always()
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Generate summary
        run: |
          echo "## ♿ Accessibility Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "### Test Status" >> $GITHUB_STEP_SUMMARY
          echo "| Test Suite | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Axe-core Tests | ${{ needs.test-a11y.result == 'success' && '✅ Pass' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Unit A11y Tests | ${{ needs.test-unit-a11y.result == 'success' && '✅ Pass' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Lighthouse Audit | ${{ needs.lighthouse.result == 'success' && '✅ Pass' || '⚠️ Warning' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "### Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "- 📄 Accessibility Reports (HTML/JSON)" >> $GITHUB_STEP_SUMMARY
          echo "- 📊 Code Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo "-  lighthouse-reports" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "### Links" >> $GITHUB_STEP_SUMMARY
          echo "- [Accessibility Documentation](./ACCESSIBILITY.md)" >> $GITHUB_STEP_SUMMARY
          echo "- [Keyboard Shortcuts](./KEYBOARD_SHORTCUTS.md)" >> $GITHUB_STEP_SUMMARY
          echo "- [Testing Checklist](./A11Y_TESTING_CHECKLIST.md)" >> $GITHUB_STEP_SUMMARY
